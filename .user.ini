; Per-directory PHP overrides. Honored by PHP running under FastCGI/php-fpm,
; which is how the app is served on DigitalOcean App Platform. Raises the
; upload ceilings so avatar + product thumbnails and up to 5 gallery images
; (the client allows 5MB each) can actually be received instead of arriving
; with UPLOAD_ERR_INI_SIZE and being rejected.
;
; post_max_size must be comfortably larger than upload_max_filesize * expected
; file count, and larger than post_max_size's usual 8M default, or the whole
; POST (including $_POST and CSRF token) gets discarded.
upload_max_filesize = 8M
post_max_size = 48M
max_file_uploads = 20
