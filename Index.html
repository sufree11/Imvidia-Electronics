<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImVidia Electronics</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        imvidia: {
                            light: '#00D2FF',
                            DEFAULT: '#007AFF',
                            dark: '#131D5A',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
             <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer">
                    <i class="fa-solid fa-eye text-imvidia text-2xl mr-2"></i>
                    <span class="font-bold text-2xl tracking-tight text-gray-900">ImVidia<span class="text-imvidia">.</span></span>
                    </div>

                    <div class="hidden md:flex space-x-8 items-center">
                    <a href="#" class="text-gray-600 hover:text-imvidia font-medium transition">Home</a>
                    <a href="#catalog" class="text-gray-600 hover:text-imvidia font-medium transition">Catalog</a>
                    <a href="#" class="text-gray-600 hover:text-imvidia font-medium transition">Support</a>
                    </div>

                    <div class="flex items-center space-x-4">
                    <button class="hidden md:block text-black-600 hover:text-imvidia font-medium transition"> Log In </button>
                    <button class="relative p-2 text-gray-600 hover:text-imvidia transition">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>
                        <span class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-imvidia rounded-full">
                            0
                        </span>
                    </button>
                    </div>
             </div>
        </div>
    </nav>
</body>
