<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImVidia Electronics</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        imvidia: {
                            light: '#00D2FF',
                            DEFAULT: '#007AFF',
                            dark: '#131D5A',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
             <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer">
                    <i class="fa-solid fa-eye text-imvidia text-2xl mr-2"></i>
                    <span class="font-bold text-2xl tracking-tight text-gray-900">ImVidia<span class="text-imvidia">.</span></span>
                    </div>

                    <div class="hidden md:flex space-x-8 items-center">
                    <a href="#" class="text-gray-600 hover:text-imvidia font-medium transition">Home</a>
                    <a href="#catalog" class="text-gray-600 hover:text-imvidia font-medium transition">Catalog</a>
                    <a href="#" class="text-gray-600 hover:text-imvidia font-medium transition">Support</a>
                    </div>

                    <div class="flex items-center space-x-4">
                    <button class="hidden md:block text-black-600 hover:text-imvidia font-medium transition"> Log In </button>
                    <button class="relative p-2 text-gray-600 hover:text-imvidia transition">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>
                        <span class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-imvidia rounded-full">
                            0
                        </span>
                    </button>
                    </div>
             </div>
        </div>
    </nav>

    <header class="bg-gray-900 text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 md:py-28 flex flex-col md:flex-row items-center">
            <div class="md:w-1/2 mb-10 md:mb-0">
                <h1 class="text-4xl md:text-5xl font-extrabold leading-tight mb-4">
                    Powering <span class="text-imvidia">Lives</span>, <br> for a better <span class="text-imvidia">Price</span>.
                </h1>

                <p class="text-lg text-gray-300 mb-8">
                    Delivering innovative, affordable, and user-friendly solutions that improve your home comfort. Power your life with Imvidia today.
                </p>

                <div class="flex space-x-4">
                    <a href="#catalog" class="bg-imvidia hover:bg-imvidia-dark text-white font-bold py-3 px-6 rounded-lg shadow-lg transition transform hover:-translate-y-1">
                        Shop Now
                    </a>
                    <button class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition transform hover:-translate-y-1">
                        Learn More
                    </button>
                </div>
            </div>
            <div class="md:w-1/2 w-full flex justify-center relative h-64 md:h-80 mt-10 md:mt-0">

                <img src="assets/hero1.jpg" alt="ImVidia Fryer" class="carousel-image w-1/2 max-w-md rounded-xl shadow-2xl transition-all duration-700 ease-in-out object-cover aspect-video">
                
                <img src="assets/hero2.jpg" alt="ImVidia Stove" class="carousel-image w-1/2 max-w-md rounded-xl shadow-2xl duration-700 ease-in-out object-cover aspect-video">
                
                <img src="assets/hero3.jpg" alt="ImVidia Mixer" class="carousel-image w-1/2 max-w-md rounded-xl shadow-2xl duration-700 ease-in-out object-cover aspect-video">
            </div>

        </div>
    </header>

        <script>
        document.addEventListener('DOMContentLoaded', () => {
            const images = document.querySelectorAll('.carousel-image');
            let currentIndex = 0;
            let pullingIndex = -1;
            let isInitialized = false;
            let intervalId;
            let timeoutId;

            function updateCarousel() {
                images.forEach((img, index) => {
                    let baseClasses = 'carousel-image absolute top-1/2 rounded-xl shadow-2xl object-cover aspect-video';
                    if (isInitialized) {
                        baseClasses += ' transition-all duration-700 ease-in-out';
                    }
                    img.className = baseClasses;
                    
                    if (index === pullingIndex) {
                        img.classList.add('z-50', 'w-[70%]', 'left-[90%]', '-translate-x-1/2', '-translate-y-[55%]', 'scale-100', 'brightness-100', 'opacity-100', 'rotate-12');
                    } else if (index === currentIndex) {
                        img.classList.add('z-40', 'w-[75%]', 'left-1/2', '-translate-x-1/2', '-translate-y-[60%]', 'scale-100', 'brightness-100', 'opacity-100', 'rotate-0');
                    } else if (index === (currentIndex + 1) % 3) {
                        img.classList.add('z-10', 'w-[60%]', 'left-[80%]', '-translate-x-1/2', '-translate-y-[40%]', 'scale-90', 'brightness-50', 'opacity-70', 'rotate-3');
                    } else {
                        img.classList.add('z-20', 'w-[60%]', 'left-[20%]', '-translate-x-1/2', '-translate-y-[40%]', 'scale-90', 'brightness-50', 'opacity-70', '-rotate-3');
                    }
                });
            }

            function startCarousel() {
                if (intervalId) clearInterval(intervalId);
                
                intervalId = setInterval(() => {
                    const nextIndex = (currentIndex + 1) % images.length;
                    
                    pullingIndex = nextIndex;
                    currentIndex = nextIndex;
                    updateCarousel();
                    
                    timeoutId = setTimeout(() => {
                        pullingIndex = -1; 
                        updateCarousel();
                    }, 350); 
                }, 3500);
            }

            function stopCarousel() {
                clearInterval(intervalId);
                clearTimeout(timeoutId);
                pullingIndex = -1;
                updateCarousel(); 
            }

            updateCarousel();

            setTimeout(() => {
                isInitialized = true;
                startCarousel();
            }, 50);

            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    stopCarousel();
                } else {
                    startCarousel();
                }
            });
        });
    </script>
        </div>
    </header>
</body>
